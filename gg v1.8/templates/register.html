<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register - PharmaLoop</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="auth-page">

<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <h2>💊 PharmaLoop</h2>
      <p>Create your account</p>
    </div>
    
    <form id="registerForm">
      
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="name" required>
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" required>
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" required>
      </div>

      <div class="form-group">
        <label>Organization Type</label>
        <select id="organization_type" required>
          <option value="">Select type</option>
          <option value="Hospital">Hospital</option>
          <option value="Pharmacy">Pharmacy</option>
          <option value="Clinic">Clinic</option>
          <option value="Medical Shop">Medical Shop</option>
        </select>
      </div>

      <div class="form-group">
        <label>Organization Name</label>
        <input type="text" id="organization_name" required>
      </div>

      <div class="form-group">
        <label>Location (City)</label>
        <input type="text" id="location" required>
      </div>

      <!-- ✅ NEW PINCODE FIELD -->
      <div class="form-group">
        <label>Pincode</label>
        <input type="text" id="pincode" placeholder="560001" required>
      </div>

      <div class="form-group">
        <label>Phone (Optional)</label>
        <input type="tel" id="phone">
      </div>

      <div id="errorMsg" class="error-msg"></div>

      <button type="submit" class="btn btn-primary btn-block">
        Create Account
      </button>

    </form>

    <div class="auth-footer">
      Already have an account? <a href="/login">Login here</a>
    </div>

  </div>
</div>

<script>
document.getElementById('registerForm').addEventListener('submit', async (e) => {
  e.preventDefault();

  const formData = {
    name: document.getElementById('name').value,
    email: document.getElementById('email').value,
    password: document.getElementById('password').value,
    organization_type: document.getElementById('organization_type').value,
    organization_name: document.getElementById('organization_name').value,
    location: document.getElementById('location').value,
    pincode: document.getElementById('pincode').value, // ✅ NEW
    phone: document.getElementById('phone').value
  };

  try {
    const response = await fetch('/api/register', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(formData)
    });

    const data = await response.json();

    if (response.ok) {
      alert('Registration successful! Please login.');
      window.location.href = '/login';
    } else {
      document.getElementById('errorMsg').textContent = data.error;
    }

  } catch (error) {
    document.getElementById('errorMsg').textContent =
      'Registration failed. Try again.';
  }
});
</script>

</body>
</html>
